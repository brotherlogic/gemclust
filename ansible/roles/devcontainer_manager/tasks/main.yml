---
- name: Clone devcontainer-manager repository
  git:
    repo: https://github.com/brotherlogic/devcontainer-manager.git
    dest: "/home/{{ ansible_user }}/devcontainer-manager"
    update: yes
  become: no

- name: Install devpod
  shell: curl -L -o devpod "https://github.com/loft-sh/devpod/releases/latest/download/devpod-linux-amd64" && install -c -m 0755 devpod /usr/local/bin && rm devpod
  args:
    creates: /usr/local/bin/devpod
  become: yes

- name: Add Docker provider to devpod
  command: devpod provider add docker
  become: no
  register: devpod_add
  failed_when: devpod_add.rc != 0 and 'already exists' not in devpod_add.stderr
  changed_when: devpod_add.rc == 0

- name: Set Docker as default devpod provider
  command: devpod provider use docker
  become: no
