apiVersion: v1
kind: Namespace
metadata:
  name: untaint-nodes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: untaint-nodes
  namespace: untaint-nodes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: untaint-nodes-admin
subjects:
- kind: ServiceAccount
  name: untaint-nodes
  namespace: untaint-nodes
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: untaint-nodes
  namespace: untaint-nodes
spec:
  template:
    spec:
      serviceAccountName: untaint-nodes
      containers:
      - name: untaint
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          kubectl taint nodes --all node-role.kubernetes.io/master- || true
          kubectl taint nodes --all node-role.kubernetes.io/control-plane- || true
      restartPolicy: OnFailure
  backoffLimit: 3
