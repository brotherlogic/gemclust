name: Validate Cluster

on:
  pull_request:
    paths:
      - 'my-cluster/**'
      - 'clusters/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Setup Kubeconform
        shell: bash
        run: |
          KUBECONFORM_VERSION="v0.6.4"
          echo "Installing Kubeconform ${KUBECONFORM_VERSION}..."
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/

      - name: Validate all kustomization.yaml resources
        run: |
          set -e
          echo "Finding and validating kustomizations..."
          
          # Find directories containing kustomization.yaml
          find . -type f -name 'kustomization.yaml' -print0 | while IFS= read -r -d $'\0' file; do
            dir=$(dirname "$file")
            echo "---"
            echo "Validating kustomization in $dir"
            kustomize build "$dir" | kubeconform -strict -summary -ignore-missing-schemas
          done
          
          echo "Validation successful!"
