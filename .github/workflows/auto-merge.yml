name: Auto Merge Pull Requests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable Auto-Merge with Squash
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          # This enables auto-merge on the pull request. Once all required status checks (tests) pass,
          # it will automatically compress (squash) the commits into one and merge it.
          # Note: "Allow auto-merge" must be enabled in your GitHub repository settings.
          gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
